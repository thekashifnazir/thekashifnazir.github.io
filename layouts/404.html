{{- define "main" }}
<section class="error-page">
  <div class="error-page__circuit" aria-hidden="true">
    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M60 10 L60 40 L80 40 L80 60 L60 60 L60 80 L40 80 L40 60 L60 60" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
      <circle cx="60" cy="60" r="6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <circle cx="60" cy="60" r="2" fill="currentColor" opacity="0.4"/>
    </svg>
  </div>
  <p class="error-page__code">404</p>
  <h1 class="error-page__title">Packet lost</h1>
  <p class="error-page__desc">The route you requested doesn't resolve. The trace ends here.</p>
  <a href="/" class="hero-cta">
    Back to origin
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</section>
