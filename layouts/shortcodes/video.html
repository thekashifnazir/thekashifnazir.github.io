<figure style="margin: 1.5rem 0;">
  <video autoplay loop muted playsinline style="max-width: 100%; height: auto; display: block; border-radius: 8px;">
    <source src="{{ .Get "src" }}" type="video/mp4">
  </video>
  {{ with .Get "caption" }}<figcaption style="margin-top: 0.5rem; font-size: 0.875rem; color: var(--secondary, #666); text-align: center;">{{ . }}</figcaption>{{ end }}
</figure>
