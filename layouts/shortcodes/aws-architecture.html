<script>
(function() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('[data-step]').forEach(function(el) {
      el.style.opacity = '1';
      el.style.transform = 'none';
    });
    return;
  }

  var diagram = document.querySelector('.arch-diagram');
  if (!diagram || typeof IntersectionObserver === 'undefined') return;

  var allSteps = diagram.querySelectorAll('[data-step]');
  allSteps.forEach(function(s) { s.classList.add('arch-diagram--hidden'); });

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        // Sort by data-step number for staggered reveal
        var sorted = Array.from(allSteps).sort(function(a, b) {
          return parseInt(a.getAttribute('data-step')) - parseInt(b.getAttribute('data-step'));
        });

        var delay = 0;
        sorted.forEach(function(el) {
          setTimeout(function() {
            el.classList.remove('arch-diagram--hidden');
            el.classList.add('arch-diagram--reveal');
          }, delay);
          delay += 100;
        });
        observer.disconnect();
      }
    });
  }, { threshold: 0.15 });

  observer.observe(diagram);
})();
</script>
