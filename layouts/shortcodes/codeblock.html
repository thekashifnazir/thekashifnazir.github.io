<figure class="codeblock-frame">
  <div class="codeblock-frame__header">
    <span class="codeblock-frame__dot"></span>
    <span class="codeblock-frame__dot"></span>
    <span class="codeblock-frame__dot"></span>
    <span class="codeblock-frame__filename">{{ .Get "file" }}</span>
  </div>
  <div class="codeblock-frame__body">
    {{ .Inner }}
  </div>
  {{ with .Get "caption" }}<figcaption class="codeblock-frame__caption">{{ . }}</figcaption>{{ end }}
</figure>
