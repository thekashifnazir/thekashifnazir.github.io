<svg width="100%" viewBox="0 0 860 470" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Deprecation timeline comparison</title>
  <desc>Three lanes compare App-V, Google product shutdowns, and Sora, showing how much time passed between announcement and shutdown.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22211f; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5a554d; }
      .lane { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22211f; }
      .box-title { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box-text { font: 500 11.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f594f; }
      .line { fill: none; stroke: #8f897f; stroke-width: 1.5; marker-end: url(#arrow); }
      .tick { stroke: #c8c0b4; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="860" height="470" rx="18"/>
  <text class="title" x="42" y="44">Deprecation notices do not all carry the same leverage</text>
  <text class="small" x="42" y="68">The date moves only when the relationship around the product can make it move.</text>

  <g>
    <rect x="42" y="108" width="128" height="50" rx="10" fill="#eef4f9" stroke="#5b7f9c"/>
    <text class="lane" x="106" y="137" text-anchor="middle">Enterprise</text>
    <line class="tick" x1="192" y1="132" x2="798" y2="132"/>
  </g>

  <g>
    <rect x="42" y="205" width="128" height="50" rx="10" fill="#f5f2ea" stroke="#91877b"/>
    <text class="lane" x="106" y="234" text-anchor="middle">SaaS</text>
    <line class="tick" x1="192" y1="229" x2="798" y2="229"/>
  </g>

  <g>
    <rect x="42" y="302" width="128" height="50" rx="10" fill="#fff0e7" stroke="#c7642d"/>
    <text class="lane" x="106" y="331" text-anchor="middle">Sora</text>
    <line class="tick" x1="192" y1="326" x2="798" y2="326"/>
  </g>

  <g>
    <rect x="206" y="96" width="126" height="72" rx="10" fill="#eaf2f8" stroke="#5b7f9c"/>
    <text class="box-title" x="269" y="121" text-anchor="middle" fill="#315a76">April 2026</text>
    <text class="box-text" x="269" y="141" text-anchor="middle" fill="#4b6f88">App-V client</text>
    <text class="box-text" x="269" y="157" text-anchor="middle" fill="#4b6f88">EOL set</text>
    <line class="line" x1="332" y1="132" x2="430" y2="132"/>
    <rect x="444" y="96" width="126" height="72" rx="10" fill="#f4f7fb" stroke="#7d93a8"/>
    <text class="box-title" x="507" y="121" text-anchor="middle" fill="#42566a">Customer</text>
    <text class="box-text" x="507" y="141" text-anchor="middle" fill="#607082">pressure</text>
    <text class="box-text" x="507" y="157" text-anchor="middle" fill="#607082">lands</text>
    <line class="line" x1="570" y1="132" x2="668" y2="132"/>
    <rect x="682" y="96" width="126" height="72" rx="10" fill="#eef6ec" stroke="#6d8a59"/>
    <text class="box-title" x="745" y="118" text-anchor="middle" fill="#45652f">Client moves</text>
    <text class="box-text" x="745" y="138" text-anchor="middle" fill="#5a7446">fixed extended</text>
    <text class="box-text" x="745" y="154" text-anchor="middle" fill="#5a7446">support</text>
  </g>

  <g>
    <rect x="206" y="193" width="126" height="72" rx="10" fill="#f5f2ea" stroke="#91877b"/>
    <text class="box-title" x="269" y="218" text-anchor="middle" fill="#554e45">Reader</text>
    <text class="box-text" x="269" y="238" text-anchor="middle" fill="#6d665d">15 weeks from</text>
    <text class="box-text" x="269" y="254" text-anchor="middle" fill="#6d665d">notice to stop</text>
    <line class="line" x1="332" y1="229" x2="520" y2="229"/>
    <rect x="534" y="193" width="126" height="72" rx="10" fill="#f2f3ef" stroke="#858f75"/>
    <text class="box-title" x="597" y="218" text-anchor="middle" fill="#4f5d3f">Stadia</text>
    <text class="box-text" x="597" y="238" text-anchor="middle" fill="#657252">16 weeks from</text>
    <text class="box-text" x="597" y="254" text-anchor="middle" fill="#657252">notice to stop</text>
  </g>

  <g>
    <rect x="206" y="290" width="126" height="72" rx="10" fill="#fff0e7" stroke="#c7642d"/>
    <text class="box-title" x="269" y="315" text-anchor="middle" fill="#873b17">24 Mar</text>
    <text class="box-text" x="269" y="335" text-anchor="middle" fill="#a55629">shutdown</text>
    <text class="box-text" x="269" y="351" text-anchor="middle" fill="#a55629">announced</text>
    <line class="line" x1="332" y1="326" x2="430" y2="326"/>
    <rect x="444" y="290" width="126" height="72" rx="10" fill="#ffe5d6" stroke="#d27a45"/>
    <text class="box-title" x="507" y="315" text-anchor="middle" fill="#873b17">26 Apr</text>
    <text class="box-text" x="507" y="335" text-anchor="middle" fill="#a55629">app and web</text>
    <text class="box-text" x="507" y="351" text-anchor="middle" fill="#a55629">experience stop</text>
    <line class="line" x1="570" y1="326" x2="668" y2="326"/>
    <rect x="682" y="290" width="126" height="72" rx="10" fill="#f9ddce" stroke="#bf5b26"/>
    <text class="box-title" x="745" y="315" text-anchor="middle" fill="#873b17">24 Sep</text>
    <text class="box-text" x="745" y="335" text-anchor="middle" fill="#a55629">API stops</text>
    <text class="box-text" x="745" y="351" text-anchor="middle" fill="#a55629">five months later</text>
  </g>

  <g>
    <rect x="178" y="394" width="506" height="42" rx="21" fill="#eeece6" stroke="#c9c2b8"/>
    <text class="note" x="431" y="412" text-anchor="middle">The pattern shifts from negotiated extension to cost-led shutdown.</text>
    <text class="note" x="431" y="429" text-anchor="middle">Same word, different power structure.</text>
  </g>
</svg>
