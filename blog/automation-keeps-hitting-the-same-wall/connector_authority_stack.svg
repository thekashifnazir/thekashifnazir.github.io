<svg width="100%" viewBox="0 0 860 430" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Connector authority inherited by an agent</title>
  <desc>A user authorizes an automation platform, the platform stores connector credentials, and an AI agent chains CRM, email, and pipeline actions without new privilege.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #22211f; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #55514a; }
      .tiny { font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b665f; }
      .box-title { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box-text { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { fill: none; stroke: #7c776f; stroke-width: 1.5; marker-end: url(#arrow); }
      .soft-line { fill: none; stroke: #b7afa5; stroke-width: 1.2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="860" height="430" rx="18"/>
  <text class="label" x="42" y="46">The agent inherits the connector stack</text>
  <text class="small" x="42" y="70">The risky part is not privilege escalation. It is unpreviewed composition of existing authority.</text>

  <g>
    <circle cx="94" cy="152" r="31" fill="#eef5fb" stroke="#4d7ea1"/>
    <circle cx="94" cy="140" r="10" fill="#d7e8f5" stroke="#4d7ea1"/>
    <path d="M74 174c5-17 35-17 40 0" fill="#d7e8f5" stroke="#4d7ea1"/>
    <text class="box-title" x="94" y="213" text-anchor="middle" fill="#315c78">User</text>
    <text class="box-text" x="94" y="232" text-anchor="middle" fill="#4e738c">connects apps once</text>
  </g>

  <g>
    <rect x="192" y="108" width="184" height="96" rx="13" fill="#fff1e8" stroke="#c95f2b"/>
    <rect x="220" y="119" width="128" height="32" rx="7" fill="#fffaf5" stroke="#f2c5ad"/>
    <image href="zapier-logo.png" x="226" y="122" width="116" height="26" preserveAspectRatio="xMidYMid slice"/>
    <rect x="218" y="162" width="132" height="30" rx="15" fill="#ffe1ce" stroke="#c95f2b"/>
    <text class="box-text" x="284" y="182" text-anchor="middle" fill="#93441f">OAuth and API keys</text>
    <line class="line" x1="126" y1="152" x2="190" y2="152"/>
    <text class="tiny" x="158" y="132" text-anchor="middle">consent</text>
  </g>

  <g>
    <rect x="452" y="100" width="176" height="112" rx="13" fill="#f3f7ed" stroke="#638044"/>
    <text class="box-title" x="540" y="128" text-anchor="middle" fill="#405e24">AI agent</text>
    <text class="box-text" x="540" y="153" text-anchor="middle" fill="#5b7839">"follow up on</text>
    <text class="box-text" x="540" y="171" text-anchor="middle" fill="#5b7839">stale leads"</text>
    <text class="tiny" x="540" y="195" text-anchor="middle">plans the sequence</text>
    <line class="line" x1="376" y1="156" x2="450" y2="156"/>
    <text class="tiny" x="414" y="137" text-anchor="middle">MCP/tools</text>
  </g>

  <g>
    <rect x="690" y="84" width="116" height="54" rx="10" fill="#edf3f8" stroke="#557a99"/>
    <text class="box-title" x="748" y="108" text-anchor="middle" fill="#2f5672">CRM</text>
    <text class="box-text" x="748" y="126" text-anchor="middle" fill="#4d718b">read records</text>
    <rect x="690" y="166" width="116" height="54" rx="10" fill="#f7eeee" stroke="#9a6464"/>
    <text class="box-title" x="748" y="190" text-anchor="middle" fill="#714242">Email</text>
    <text class="box-text" x="748" y="208" text-anchor="middle" fill="#885a5a">send drafts</text>
    <rect x="690" y="248" width="116" height="54" rx="10" fill="#f0eef7" stroke="#74689e"/>
    <text class="box-title" x="748" y="272" text-anchor="middle" fill="#514678">Pipeline</text>
    <text class="box-text" x="748" y="290" text-anchor="middle" fill="#685b92">update stage</text>
    <path class="soft-line" d="M628 142c32-28 39-31 60-31"/>
    <path class="soft-line" d="M628 156c30 15 38 30 60 37"/>
    <path class="soft-line" d="M628 174c35 58 42 88 60 101"/>
  </g>

  <g>
    <rect x="192" y="284" width="436" height="78" rx="13" fill="#eeece6" stroke="#c9c2b8"/>
    <text class="box-title" x="410" y="315" text-anchor="middle" fill="#514d46">No new privilege appears in the log</text>
    <text class="box-text" x="410" y="337" text-anchor="middle" fill="#69645d">The platform already had the authority;</text>
    <text class="box-text" x="410" y="353" text-anchor="middle" fill="#69645d">the agent changed the order and scope of use.</text>
    <line class="soft-line" x1="540" y1="212" x2="540" y2="282"/>
  </g>

  <g>
    <rect x="54" y="284" width="94" height="78" rx="13" fill="#f7f2e9" stroke="#aa8b5e"/>
    <text class="box-title" x="101" y="315" text-anchor="middle" fill="#775b31">Audit</text>
    <text class="box-text" x="101" y="338" text-anchor="middle" fill="#896d43">looks tidy</text>
    <line class="soft-line" x1="192" y1="323" x2="150" y2="323"/>
  </g>
</svg>
