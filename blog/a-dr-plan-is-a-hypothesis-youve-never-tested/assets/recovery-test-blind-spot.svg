<svg width="100%" viewBox="0 0 760 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Backup restore proof versus fault injection proof</title>
<desc>A two-column diagram. The left side asks whether the backup is usable and shows restore testing as the proof. The right side asks whether failover responds and shows AWS FIS as the proof. A note says a clean fault-injection run can still miss a broken backup job.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: "Anthropic Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #141413; font-size: 20px; font-weight: 650; }
    .sub { fill: #5f5e5a; font-size: 13px; }
    .panel { fill: #fbfaf6; stroke: #d8d5ca; stroke-width: 1; }
    .panel-title { fill: #141413; font-size: 17px; font-weight: 700; }
    .panel-sub { fill: #5f5e5a; font-size: 12px; }
    .label { fill: #141413; font-size: 14px; font-weight: 700; }
    .small { fill: #5f5e5a; font-size: 11px; }
    .bad { fill: #faece7; stroke: #993c1d; }
    .warn { fill: #fff2cc; stroke: #a36500; }
    .ok { fill: #e1f5ee; stroke: #0f6e56; }
    .aws { fill: #e6f1fb; stroke: #185fa5; }
    .line { fill: none; stroke: #73726c; stroke-width: 1.7; marker-end: url(#arrow); }
    .note { fill: #ffedd5; stroke: #b45309; stroke-width: 1; }
    .note-text { fill: #7c2d12; font-size: 14px; font-weight: 750; }
  </style>
</defs>

<g>
  <text x="40" y="42" class="title">A DR plan needs two different proofs</text>
  <text x="40" y="66" class="sub">Fault injection can test the response path. It cannot prove the backup itself is good.</text>
</g>

<g>
  <rect x="40" y="92" width="326" height="170" rx="10" class="panel"/>
  <text x="64" y="122" class="panel-title">Is the backup usable?</text>
  <text x="64" y="143" class="panel-sub">Only a real restore test answers this.</text>

  <rect x="64" y="166" width="82" height="58" rx="8" class="bad"/>
  <text x="105" y="190" text-anchor="middle" class="label">Backup job</text>
  <text x="105" y="209" text-anchor="middle" class="small">Failed weekly</text>

  <path d="M148 195H176" class="line"/>

  <rect x="180" y="166" width="70" height="58" rx="8" class="warn"/>
  <text x="215" y="190" text-anchor="middle" class="label">Tape</text>
  <text x="215" y="209" text-anchor="middle" class="small">Unknown</text>

  <path d="M252 195H280" class="line"/>

  <rect x="284" y="166" width="58" height="58" rx="8" class="ok"/>
  <text x="313" y="190" text-anchor="middle" class="label">Restore</text>
  <text x="313" y="209" text-anchor="middle" class="small">Proves it</text>
</g>

<g>
  <rect x="394" y="92" width="326" height="170" rx="10" class="panel"/>
  <text x="418" y="122" class="panel-title">Does failover respond?</text>
  <text x="418" y="143" class="panel-sub">AWS FIS helps test this downstream path.</text>

  <rect x="418" y="166" width="76" height="58" rx="8" class="aws"/>
  <text x="456" y="190" text-anchor="middle" class="label">AWS FIS</text>
  <text x="456" y="209" text-anchor="middle" class="small">Injects fault</text>

  <path d="M496 195H526" class="line"/>

  <rect x="530" y="166" width="76" height="58" rx="8" class="aws"/>
  <text x="568" y="190" text-anchor="middle" class="label">Failover</text>
  <text x="568" y="209" text-anchor="middle" class="small">Path reacts</text>

  <path d="M608 195H638" class="line"/>

  <rect x="642" y="166" width="54" height="58" rx="8" class="ok"/>
  <text x="669" y="190" text-anchor="middle" class="label">Pass</text>
  <text x="669" y="209" text-anchor="middle" class="small">Maybe</text>
</g>

<g>
  <rect x="116" y="292" width="528" height="46" rx="10" class="note"/>
  <text x="380" y="321" text-anchor="middle" class="note-text">A clean FIS run can still miss a backup job that has been failing upstream.</text>
</g>
</svg>
