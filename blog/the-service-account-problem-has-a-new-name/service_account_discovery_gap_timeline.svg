<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A horizontal timeline showing four stages: account created with broad permissions, years of invisible drift, migration forces enumeration, scoping work begins. The middle drift section is greyed out to show the period during which nothing surfaces the account.</desc>
